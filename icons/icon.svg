  <!-- 脳のしわ（ひかえめに・おでこ部分だけ） -->
  <g fill="none" stroke="#BEDBA0" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 196 v30"/>
    <path d="M256 214 q-30 -12 -50 6"/>
    <path d="M256 214 q30 -12 50 6"/>
    <path d="M196 238 q-16 6 -18 26"/>
    <path d="M316 238 q16 6 18 26"/>
  </g>

  <!-- ほっぺ（ピンク） -->
  <ellipse cx="170" cy="346" rx="22" ry="13" fill="#F48FB1" opacity="0.6"/>
  <ellipse cx="342" cy="346" rx="22" ry="13" fill="#F48FB1" opacity="0.6"/>

  <!-- つぶらな目 -->
  <ellipse cx="208" cy="322" rx="16" ry="20" fill="#3B3230"/>
  <ellipse cx="304" cy="322" rx="16" ry="20" fill="#3B3230"/>
  <circle cx="202" cy="314" r="5.5" fill="#FFFFFF"/>
  <circle cx="298" cy="314" r="5.5" fill="#FFFFFF"/>

  <!-- にっこり口 -->
  <path d="M230 350 q26 26 52 0" fill="none" stroke="#6D4C41" stroke-width="9" stroke-linecap="round"/>

  <!-- 若葉（そよぎ）が頭から芽吹く -->
  <path d="M256 178 C 250 152 250 132 256 110" fill="none" stroke="#4CAF50" stroke-width="13" stroke-linecap="round"/>
  <path d="M258 138 C 284 118 314 122 326 144 C 300 166 268 162 258 138 Z" fill="url(#leaf)"/>
  <path d="M254 120 C 228 100 198 104 186 126 C 212 148 244 144 254 120 Z" fill="url(#leaf)"/>

  <!-- きらめき -->
  <path d="M388 150 l8 20 l20 8 l-20 8 l-8 20 l-8 -20 l-20 -8 l20 -8 Z" fill="#FFD54F"/>
  <circle cx="150" cy="182" r="8" fill="#FFECB3"/>
